<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- 呆呆的脸 - 白色圆脸 -->
  <circle cx="64" cy="66" r="42" fill="white" opacity="0.95"/>
  <!-- 左眼 - 呆萌大眼 -->
  <circle cx="49" cy="60" r="9.5" fill="#3d3d3d"/>
  <circle cx="52.5" cy="56.5" r="3.5" fill="white"/>
  <!-- 右眼 - 呆萌大眼 -->
  <circle cx="79" cy="60" r="9.5" fill="#3d3d3d"/>
  <circle cx="82.5" cy="56.5" r="3.5" fill="white"/>
  <!-- 腮红 -->
  <ellipse cx="37" cy="74" rx="8" ry="5" fill="#ffb3b3" opacity="0.55"/>
  <ellipse cx="91" cy="74" rx="8" ry="5" fill="#ffb3b3" opacity="0.55"/>
  <!-- 嘴巴 - 微张的呆萌小嘴 -->
  <ellipse cx="64" cy="80" rx="5.5" ry="4" fill="#e8a0a0"/>
  <!-- 头顶小呆毛 -->
  <path d="M60 24 Q64 14 68 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
